name: CI
on: [push, pull_request]
jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        # cpal needs ALSA; winit/egui-winit need xkbcommon + wayland + X11 (the
        # crate enables egui-winit's "wayland" and "x11" features, so both are
        # required, not just whichever the runner's default session uses).
        # Matches README.md's documented Arch/pacman package list, translated
        # to apt for the ubuntu-latest CI runner.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev libudev-dev \
            libxkbcommon-dev libwayland-dev \
            libx11-dev libxi-dev libxcursor-dev libxrandr-dev libxinerama-dev
      - uses: dtolnay/rust-toolchain@1.96
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown, thumbv7em-none-eabihf
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - run: cargo test --workspace --features test-roms
      - run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps
        if: runner.os == 'Linux'
  no_std:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96
        with:
          targets: thumbv7em-none-eabihf
      - run: cargo build -p rusty2600-core --target thumbv7em-none-eabihf --no-default-features
  perf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96
      # `bench_regression_check.sh` runs the whole-system frame bench
      # (`rusty2600-core`'s `system_full_ntsc_frame`) and fails the job if
      # the measured mean exceeds a fixed absolute ceiling -- see the
      # script's own header comment and docs/performance.md for the
      # baseline/ceiling rationale. ubuntu-latest only (deliberately not the
      # full 3-OS matrix): bench timing noise across OSes would only add
      # false-positive risk to a trip-wire that just needs one consistent
      # runner.
      - run: bash scripts/bench_regression_check.sh
