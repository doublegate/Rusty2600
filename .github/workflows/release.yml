name: Release
on:
  push:
    tags: ["v*"]
permissions:
  contents: write
jobs:
  build:
    strategy:
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu, archive: tar.gz }
          - { os: macos-latest, target: aarch64-apple-darwin, archive: tar.gz }
          - { os: windows-latest, target: x86_64-pc-windows-msvc, archive: zip }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        # Same set ci.yml installs: cpal needs ALSA, gilrs needs udev,
        # winit/egui-winit need xkbcommon + wayland + X11.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev libudev-dev \
            libxkbcommon-dev libwayland-dev \
            libx11-dev libxi-dev libxcursor-dev libxrandr-dev libxinerama-dev
      - uses: dtolnay/rust-toolchain@1.96
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release -p rusty2600-frontend --target ${{ matrix.target }}
      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          staging="rusty2600-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "$staging"
          cp "target/${{ matrix.target }}/release/rusty2600" "$staging/"
          cp README.md LICENSE-MIT LICENSE-APACHE "$staging/"
          tar czf "$staging.tar.gz" "$staging"
          echo "ASSET=$staging.tar.gz" >> "$GITHUB_ENV"
      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          staging="rusty2600-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "$staging"
          cp "target/${{ matrix.target }}/release/rusty2600.exe" "$staging/"
          cp README.md LICENSE-MIT LICENSE-APACHE "$staging/"
          7z a "$staging.zip" "$staging"
          echo "ASSET=$staging.zip" >> "$GITHUB_ENV"
      - name: Upload release asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" "${{ env.ASSET }}" --clobber
