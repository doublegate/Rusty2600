<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Rusty2600 (WASM)</title>
    <!-- Trunk will compile the rust crate and inject the wasm binding here -->
    <link data-trunk rel="rust" data-target-name="rusty2600_frontend" href="../Cargo.toml" data-cargo-features="wasm-winit" />
    <style>
      body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #1e1e1e;
        color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: sans-serif;
      }
      canvas {
        max-width: 100%;
        max-height: 100%;
      }
    </style>
  </head>
  <body>
    <div>
      <input type="file" id="rom-input" accept=".bin" />
    </div>
    <div id="rusty2600_canvas_container">
        <canvas id="atari-canvas"></canvas>
    </div>
  </body>
</html>
